services:
  pg1:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_production
      POSTGRES_USER: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg1data:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_preload_libraries='pg_stat_statements'
        -c pg_stat_statements.track=all
        -c log_min_messages=log
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  pg2:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_staging
      POSTGRES_USER: postgres
    ports:
      - "5434:5432"
    volumes:
      - pg2data:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_preload_libraries='pg_stat_statements'
        -c pg_stat_statements.track=all
        -c log_min_messages=log
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pg1data:
  pg2data:
