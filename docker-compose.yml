services:
  pg_sage:
    build: .
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_preload_libraries='pg_stat_statements,pg_sage'
        -c sage.database='postgres'
        -c sage.collector_interval=30
        -c sage.analyzer_interval=60
        -c sage.trust_level='advisory'
        -c pg_stat_statements.track=all
        -c log_min_messages=log
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  sidecar:
    build: ./sidecar
    depends_on:
      pg_sage:
        condition: service_healthy
    environment:
      SAGE_DATABASE_URL: postgres://postgres:postgres@pg_sage:5432/postgres?sslmode=disable
      SAGE_PROMETHEUS_PORT: "9187"
      SAGE_RATE_LIMIT: "60"
    ports:
      - "8080:8080"   # API + Dashboard
      - "9187:9187"   # Prometheus metrics

  # --------------------------------------------------------------------------
  # Sidecar-only mode (standalone, no pg_sage extension required)
  # --------------------------------------------------------------------------
  # To use the sidecar with an external database (RDS, Aurora, Cloud SQL, etc.)
  # without the pg_sage C extension, run just the sidecar service:
  #
  #   docker compose run --rm -e SAGE_DATABASE_URL="postgres://user:pass@your-rds-host:5432/dbname?sslmode=require" \
  #     -p 8080:8080 -p 9187:9187 sidecar
  #
  # Or add a dedicated service:
  #
  #   sidecar-standalone:
  #     build: ./sidecar
  #     environment:
  #       SAGE_DATABASE_URL: "postgres://user:pass@your-rds-host:5432/dbname?sslmode=require"
  #       SAGE_PROMETHEUS_PORT: "9187"
  #     ports:
  #       - "8080:8080"
  #       - "9187:9187"
  #
  # The sidecar auto-detects whether the pg_sage extension is installed and
  # falls back to direct catalog queries (sidecar-only mode) if it is not.
  # --------------------------------------------------------------------------

volumes:
  pgdata:
