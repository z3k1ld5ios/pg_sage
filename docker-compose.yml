services:
  # --- Fleet walkthrough: two plain PostgreSQL instances ---
  pg1:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg1data:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pg2:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pg2data:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Legacy: single instance with pg_sage C extension ---
  pg_sage:
    build: .
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_preload_libraries='pg_stat_statements,pg_sage'
        -c sage.database='postgres'
        -c sage.collector_interval=30
        -c sage.analyzer_interval=60
        -c sage.trust_level='advisory'
        -c pg_stat_statements.track=all
        -c log_min_messages=log
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  sidecar:
    build: ./sidecar
    depends_on:
      pg_sage:
        condition: service_healthy
    environment:
      SAGE_DATABASE_URL: postgres://postgres:postgres@pg_sage:5432/postgres?sslmode=disable
      SAGE_PROMETHEUS_PORT: "9187"
      SAGE_RATE_LIMIT: "60"
    ports:
      - "8080:8080"   # API + Dashboard
      - "9187:9187"   # Prometheus metrics

volumes:
  pgdata:
  pg1data:
  pg2data:
