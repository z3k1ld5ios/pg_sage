mode: standalone
postgres:
  host: <CLOUD_SQL_IP>
  port: 5432
  user: sage_agent
  password: <PASSWORD>
  database: sage_test
  sslmode: require
  max_connections: 5
collector:
  interval_seconds: 30
analyzer:
  interval_seconds: 60
  unused_index_window_days: 7
trust:
  level: autonomous
  ramp_start: "2025-01-01T00:00:00Z"
  tier3_safe: true
  tier3_moderate: true
  maintenance_window: "* * * * *"
llm:
  enabled: true
  endpoint: "https://generativelanguage.googleapis.com/v1beta/openai/chat/completions"
  model: "gemini-2.5-flash"
  api_key: "<GEMINI_API_KEY>"
  timeout_seconds: 30
  token_budget_daily: 100000
  optimizer:
    enabled: true
    min_query_calls: 5
  advisor:
    enabled: true
    interval_seconds: 120
mcp:
  listen_addr: "0.0.0.0:5436"
prometheus:
  listen_addr: "0.0.0.0:9188"
api:
  listen_addr: "0.0.0.0:8081"
